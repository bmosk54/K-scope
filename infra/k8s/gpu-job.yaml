# Runs the biolayer extractor on the g5.2xlarge managed nodegroup once the node is Ready.
# Prereq: the NVIDIA k8s device plugin installed (README step 3) so the node advertises
# `nvidia.com/gpu`. The AL2023 NVIDIA AMI already carries the host driver + toolkit.
#
#   kubectl create secret generic hf-token --from-literal=token=<hf_read_token>
#   kubectl apply -f infra/k8s/gpu-job.yaml
---
apiVersion: batch/v1
kind: Job
metadata:
  name: biolayer-extract
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      # Pin to the G5 node (the managed nodegroup's instance type).
      nodeSelector:
        node.kubernetes.io/instance-type: g5.2xlarge
      containers:
        - name: extract
          # Build + push this image (torch+timm+biolayer) to a registry the node can pull.
          image: REPLACE_ME/biolayer:latest
          command: ["python", "-m", "biolayer.data.extract",
                    "--track", "h0", "--split", "train", "--per-class", "600", "--no-upload"]
          resources:
            limits:
              nvidia.com/gpu: 1        # requires the NVIDIA device plugin on the node
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
            # S3 creds: prefer IRSA. If the hybrid node can't assume the IRSA role,
            # mount the workshop session creds as a Secret instead (short-lived).
