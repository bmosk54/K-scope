# EKS cluster with HYBRID NODES enabled — the control plane runs in AWS, but the
# GPU worker is an EXTERNAL machine (your own / on-prem / other-cloud GPU box) joined
# via nodeadm. That node is NOT an EC2 instance, so it does NOT count against the
# EC2 G/VT vCPU quota (which is 0 on this workshop account — see infra/README.md).
#
#   eksctl create cluster -f infra/eksctl-hybrid-cluster.yaml
#
# Requires eksctl >= 0.199 (remoteNetworkConfig support). NO nodeGroups/managedNodeGroups
# here on purpose — the only worker is the hybrid node attached afterward.
apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: owkin-hybrid
  region: us-west-2
  version: "1.31"

# --- Hybrid nodes: declare the network(s) your EXTERNAL node + its pods live on ---
# These CIDRs must match your GPU box's LAN and the pod CIDR your CNI will hand out.
# The control plane must be able to route to these (via VPN / Direct Connect — see
# README prereqs). Adjust to your actual node network before creating.
remoteNetworkConfig:
  iam:
    # SSM = AWS Systems Manager hybrid activation (simplest to bootstrap).
    # Alternative: IRA (IAM Roles Anywhere) if you already run a PKI.
    provider: SSM
  remoteNodeNetworks:
    - "192.168.0.0/16"      # <-- CIDR of the network your external GPU node is on
  remotePodNetworks:
    - "10.86.0.0/16"        # <-- pod CIDR you will configure in Cilium (below)

# Hybrid nodes are NOT compatible with the default VPC CNI. Skip it here and install
# Cilium (or Calico) after the cluster is up (see README step 3).
addonsConfig:
  disableDefaultAddons: true   # skip vpc-cni/kube-proxy/coredns defaults; install hybrid-safe ones

iam:
  withOIDC: true   # needed for IRSA (pods -> S3 bucketbiolayer without static keys)
