# Runs ON THE EXTERNAL GPU MACHINE (not in AWS). Tells nodeadm how to join the
# owkin-hybrid EKS control plane. This machine is your GPU box — its NVIDIA hardware
# is what circumvents the EC2 quota.
#
# On the GPU node:
#   curl -sSL https://hybrid-assets.eks.amazonaws.com/releases/latest/bin/linux/amd64/nodeadm -o /usr/local/bin/nodeadm
#   chmod +x /usr/local/bin/nodeadm
#   sudo nodeadm install 1.31 --credential-provider ssm     # driver-agnostic; installs kubelet/containerd
#   sudo nodeadm init -c file://nodeadm-config.yaml
#
# The activationCode/activationId come from an SSM hybrid activation created by an
# admin (see infra/README.md — the participant role likely cannot create these).
apiVersion: node.eks.aws/v1alpha1
kind: NodeConfig
spec:
  cluster:
    name: owkin-hybrid
    region: us-west-2
  hybrid:
    ssm:
      activationCode: "REPLACE_ME"     # from: aws ssm create-activation ...
      activationId: "REPLACE_ME"
